name: myprofile-app

services:
  php:
    container_name: myprofile-php
    image: myprofile-app-php
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    restart: no
    volumes:
      - ./:/var/www:delegated
      - vendor_cache:/var/www/vendor
      - bootstrap_cache:/var/www/bootstrap/cache
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    ports:
      - "9000:9000"
    networks:
      - ets-sistema-network
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: America/Fortaleza
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: myprofile
      DB_USERNAME: myprofile
      DB_PASSWORD: myprofile_local
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    container_name: myprofile-nginx
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    restart: no
    ports:
      - "8080:80"
      # - "443:443"
    volumes:
      - ./:/var/www:delegated,ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ets-sistema-network
    depends_on:
      - php
    extra_hosts:
      - "host.docker.internal:host-gateway"

  queue:
    container_name: myprofile-queue
    image: myprofile-app-php
    restart: unless-stopped
    command: php artisan queue:work --sleep=1 --tries=3 --timeout=60
    volumes:
      - ./:/var/www:delegated
      - vendor_cache:/var/www/vendor
      - bootstrap_cache:/var/www/bootstrap/cache
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    networks:
      - ets-sistema-network
    depends_on:
      mysql:
        condition: service_healthy
      php:
        condition: service_started
    environment:
      TZ: America/Fortaleza
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: myprofile
      DB_USERNAME: myprofile
      DB_PASSWORD: myprofile_local

  scheduler:
    container_name: myprofile-scheduler
    image: myprofile-app-php
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - ./:/var/www:delegated
      - vendor_cache:/var/www/vendor
      - bootstrap_cache:/var/www/bootstrap/cache
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    networks:
      - ets-sistema-network
    depends_on:
      mysql:
        condition: service_healthy
      php:
        condition: service_started
    environment:
      TZ: America/Fortaleza
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: myprofile
      DB_USERNAME: myprofile
      DB_PASSWORD: myprofile_local

  mysql:
    image: mysql:8.4
    container_name: myprofile-mysql
    restart: no
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - myprofile_mysql_data:/var/lib/mysql
    networks:
      - ets-sistema-network
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: myprofile
      MYSQL_USER: myprofile
      MYSQL_PASSWORD: myprofile_local
      MYSQL_ROOT_PASSWORD: myprofile_root_local
      TZ: America/Fortaleza
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -umyprofile -pmyprofile_local --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  node:
    image: node:24-alpine
    container_name: myprofile-node
    working_dir: /var/www
    command: >
      sh -lc "if [ -f package-lock.json ]; then npm ci; else npm i; fi;
              npm run dev -- --host 0.0.0.0 --port 5137"
    ports:
      - "5137:5137"   # Vite/HMR no host (como era)
    volumes:
      - ./:/var/www:delegated
      - node_modules_cache:/var/www/node_modules
    depends_on:
      - php
    networks:
      - ets-sistema-network
    environment:
      CHOKIDAR_USEPOLLING: "true"

networks:
  ets-sistema-network:
    driver: bridge

volumes:
  myprofile_mysql_data:
    driver: local
  vendor_cache:
    driver: local
  bootstrap_cache:
    driver: local
  node_modules_cache:
    driver: local
