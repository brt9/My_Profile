name: quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  application:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: myprofile_test
          POSTGRES_USER: myprofile
          POSTGRES_PASSWORD: myprofile_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U myprofile -d myprofile_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: myprofile_test
      DB_USERNAME: myprofile
      DB_PASSWORD: myprofile_test
      DB_TIMEZONE: UTC
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
      - run: composer install --no-interaction --no-progress --prefer-dist
      - run: npm ci
      - run: cp .env.example .env && php artisan key:generate
      - run: php artisan test
      - run: vendor/bin/pint --test
      - run: composer analyse
      - run: npm run build
      - run: npm run test:secrets

  telemetry-agent:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tools/telemetry-agent
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - run: dotnet restore
      - run: dotnet build --configuration Release --no-restore
      - run: dotnet publish --configuration Release --runtime win-x64 --self-contained false
