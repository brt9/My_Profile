name: quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: myprofile_test
          POSTGRES_USER: myprofile
          POSTGRES_PASSWORD: myprofile_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U myprofile -d myprofile_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: myprofile_test
      DB_USERNAME: myprofile
      DB_PASSWORD: myprofile_test
      DB_TIMEZONE: UTC
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: composer install --no-interaction --prefer-dist
      - run: npm ci
      - run: cp .env.example .env && php artisan key:generate
      - run: php artisan test
      - run: vendor/bin/pint --test
      - run: npm run build
      - run: npm run test:secrets
