<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#111116">
    <title>Pedro Felipe — Offline</title>
    <style>
        :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
        * { box-sizing: border-box; }
        body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: #111116; color: #f7f6f3; padding: 24px; }
        main { width: min(100%, 520px); border: 1px solid #31313a; border-radius: 24px; background: #19191f; padding: 32px; text-align: center; }
        img { width: 72px; height: 72px; border: 1px solid #363640; border-radius: 18px; }
        h1 { margin: 20px 0 10px; font-size: clamp(1.6rem, 5vw, 2.4rem); }
        p { margin: 0; color: #b6b4be; line-height: 1.65; }
        button { min-height: 44px; margin-top: 24px; border: 1px solid #454550; border-radius: 12px; background: #f7f6f3; color: #111116; padding: 10px 18px; font: inherit; font-weight: 750; cursor: pointer; }
    </style>
</head>
<body>
    <main>
        <img src="/icons/icon-192.png?v=2" alt="">
        <h1>Você está offline.</h1>
        <p>O portfólio não conseguiu acessar a rede agora. Quando a conexão voltar, tente novamente.</p>
        <button type="button" onclick="window.location.reload()">Tentar novamente</button>
    </main>
</body>
</html>
